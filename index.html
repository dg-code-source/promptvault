<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c2c2c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  
  <title>PromptVault</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <!-- Update Notification Banner -->
  <div id="update-banner" class="banner hidden">
    <div class="banner-content">
      <span>App update available!</span>
      <button id="update-btn" class="btn btn-sm btn-dark">Update Now</button>
    </div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <svg class="logo-svg" viewBox="0 0 512 512" width="32" height="32">
          <rect width="512" height="512" rx="112" fill="#2c2c2c" />
          <path d="M170 150 L280 256 L170 362" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
          <line x1="300" y1="355" x2="380" y2="355" stroke="#ffffff" stroke-width="48" stroke-linecap="round" />
        </svg>
        <h1>PromptVault</h1>
      </div>
      <button id="settings-toggle-btn" class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search prompts, categories, tags..." autocomplete="off">
        <button id="search-clear-btn" class="clear-btn hidden" aria-label="Clear search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </section>

    <!-- Category Tabs Navigation -->
    <nav class="category-nav" id="category-tabs">
      <button class="tab-btn active" data-category="all">All</button>
      <button class="tab-btn" data-category="favorites">
        <span class="tab-icon">★</span> Favorites
      </button>
      <!-- Dynamic categories populated by app.js -->
    </nav>

    <!-- Prompt Cards Grid -->
    <main class="prompts-main">
      <div id="prompts-grid" class="prompts-grid">
        <!-- Dynamic prompt cards populated by app.js -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="9"></line>
            <line x1="9" y1="13" x2="15" y2="13"></line>
            <line x1="9" y1="17" x2="11" y2="17"></line>
          </svg>
        </div>
        <h2 id="empty-title">No prompts found</h2>
        <p id="empty-description">Try adjusting your search query or view another category.</p>
        <button id="empty-action-btn" class="btn btn-dark">View All Prompts</button>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close-btn" class="icon-btn" aria-label="Close settings">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-group">
          <h3>Vibe & Feedback</h3>
          <label class="switch-label">
            <span>Haptic Feedback (Vibrate on Copy)</span>
            <input type="checkbox" id="setting-vibrate" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="settings-group">
          <h3>Data Synchronisation</h3>
          <button id="sync-btn" class="btn btn-outline btn-full">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
            Force Sync from GitHub
          </button>
          <p class="settings-help">Clears local prompt cache and fetches the latest file from your server.</p>
        </div>
        <div class="settings-footer">
          <p class="app-version">PromptVault v1.0.0</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div id="toast-container" class="toast-container"></div>

  <script src="./app.js"></script>
</body>
</html>
